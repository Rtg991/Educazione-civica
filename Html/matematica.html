<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSA MODERN | LBG Sicilia</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00ffaa;
      --secondary: #00d4ff;
      --bg-dark: #081c15;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top right, #1b4332, #081c15);
      background-attachment: fixed;
      color: #e0e0e0;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(8, 28, 21, 0.8);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .logo span { color: var(--primary); }

    .navbar nav { display: flex; gap: 30px; }

    .navbar nav a {
      color: #8fa19e;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .navbar nav a:hover { color: var(--primary); }

    /* HERO */
    .hero {
      padding: 80px 20px 40px;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      background: linear-gradient(to bottom, #fff, #8fa19e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .hero-subtitle {
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* CILINDRO INFO (Sostituisce le immagini con icone/testo) */
    .cylinder-wrapper {
      height: 450px;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1500px;
      margin-bottom: 40px;
    }

    .cylinder {
      position: relative;
      width: 200px;
      height: 280px;
      transform-style: preserve-3d;
    }

    .cylinder-card {
      position: absolute;
      width: 220px;
      height: 300px;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: border 0.3s, box-shadow 0.3s;
    }

    .cylinder-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 30px rgba(0, 255, 170, 0.2);
    }

    .cylinder-card .icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .cylinder-card h4 {
      color: var(--primary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* PARAGRAFO ESTESO */
    .container {
      max-width: 900px;
      margin: 0 auto 100px;
      padding: 0 20px;
    }

    .paragraph {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 60px;
      border-radius: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .paragraph::before {
      content: '"';
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 120px;
      color: rgba(0, 255, 170, 0.05);
      font-family: serif;
    }

    .paragraph .title {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .paragraph .title::before {
      content: '';
      width: 40px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
    }

    .paragraph p {
      font-size: 1.15rem;
      color: #c9d1d0;
      text-align: justify;
    }

      border-top: 1px solid var(--glass-
