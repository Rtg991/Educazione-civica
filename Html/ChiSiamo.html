<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Classe 4F - ITI G. Ferraris</title>
    <style>
        /* Reset e Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sfondo Animato */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenitore Card */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* Intestazione */
        h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* Paragrafo stilizzato */
        .info-text {
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Evidenziazione nomi e scuola */
        .highlight {
            font-weight: 600;
            color: #fff;
            border-bottom: 2px solid #23d5ab;
            padding-bottom: 2px;
        }

        /* Footer / Badge */
        .badge {
            margin-top: 30px;
            display: inline-block;
            background: white;
            color: #e73c7e;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="info-text">
            Siamo gli alunni <span class="highlight">Antoci Giuseppe</span>, 
            <span class="highlight">Chessari Luca</span> e 
            <span class="highlight">Scollo Daniele</span> 
            della classe <span class="highlight">4F</span> 
            dell'istituto tecnico industriale <br>
            <strong>"Galileo Ferraris" di Ragusa</strong>.
        </p>

        <div class="badge">A.S. 2025/2026</div>
    </div>

</body>
</html>
