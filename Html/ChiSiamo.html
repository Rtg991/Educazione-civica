<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Siamo - ITI G. Ferraris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #228b22, #00008b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
        }

        .logo { font-weight: 800; font-size: 24px; color: white; }

        .navbar nav { display: flex; gap: 30px; }

        .navbar nav a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .navbar nav a:hover { opacity: 1; color: #00ffaa; }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffaa, #0077ff);
            color: #020a08;
            text-decoration: none;
            font-weight: 700;
            transition: 0.4s;
        }

        /* CONTENITORE PRINCIPALE */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* IL PARAGRAFO TRASPARENTE CON BORDO NEON */
        .card-presentazione {
            max-width: 900px;
            padding: 60px 40px;
            border-radius: 25px;
            
            /* Sfondo totalmente rimosso */
            background: transparent; 
            
            /* Bordo Gradiente (Stile Screenshot) */
            border: 3.5px solid transparent;
            background-image: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0)), 
                              linear-gradient(135deg, #00f2fe, #4facfe, #0077ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;

            /* Glow Esterno Blu */
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
            
            transition: all 0.5s ease;
        }

        .card-presentazione:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.6);
            /* Al passaggio del mouse aggiungiamo un velo quasi invisibile per leggibilità */
            background: rgba(255, 255, 255, 0.03); 
        }

        /* Testo Riordinato */
        .intro {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .nomi {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.2;
            color: #fff;
        }

        .dettagli {
            font-size: 1.4rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .istituto {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 15px;
            color: #fff;
        }

        .highlight-accent {
            color: #00ffaa;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">CSA MODERN</div>
        <nav>
            <a href="sostenibilita.html">Home</a>
            <a href="finalita.html">Finalità e Progetto</a>
            <a href="ChiSiamo.html">Chi siamo</a>
        </nav>
        <div class="buttons">
            <a href="scopri.html" class="btn">Scopri</a>
        </div>
    </header>

    <main class="main-content">
        <div class="card-presentazione">
            <p class="intro">Team di Sviluppo</p>
            
            <p class="nomi">
                Antoci Giuseppe • Chessari Luca • Scollo Daniele
            </p>

            <p class="dettagli">
                Classe <span class="highlight-accent">4F</span>
            </p>

            <p class="istituto">
                Istituto Tecnico Industriale <br>
                <span class="highlight-accent">"Galileo Ferraris"</span> di Ragusa
            </p>
        </div>
    </main>

</body>
</html>
