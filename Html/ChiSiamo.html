<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Classe 4F - ITI G. Ferraris</title>
    <style>
        /* Reset e Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sfondo Animato */
         body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #228b22, #00008b);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

    /* NAVBAR UGUALE AL BODY */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 8%;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar nav {
      display: flex;
      gap: 30px;
    }

    .navbar nav a {
      color: #8fa19e;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .navbar nav a:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
    }

    .logo {
      font-weight: 800;
      font-size: 24px;
      color: #fff;
      letter-spacing: 1px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 50px;
      background: linear-gradient(135deg, #00ffaa, #0077ff);
      color: #020a08;
      text-decoration: none;
      font-weight: 700;
      transition: 0.4s;
      border: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.4);
      filter: brightness(1.1);
    }

    h1 {
      margin: 20px;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .card button:hover {
      background: #0077ff;
    }

    #output {
      margin-top: 20px;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenitore Card */
        

        /* Paragrafo stilizzato */
        .info-text {
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Evidenziazione nomi e scuola */
        .highlight {
            font-weight: 600;
            color: #fff;
            border-bottom: 2px solid #23d5ab;
            padding-bottom: 2px;
        }

        /* Footer / Badge */
        .badge {
            margin-top: 30px;
            display: inline-block;
            background: white;
            color: #e73c7e;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="info-text">
            Siamo gli alunni <span class="highlight">Antoci Giuseppe</span>, 
            <span class="highlight">Chessari Luca</span> e 
            <span class="highlight">Scollo Daniele</span> 
            della classe <span class="highlight">4F</span> 
            dell'istituto tecnico industriale <br>
            <strong>"Galileo Ferraris" di Ragusa</strong>.
        </p>

        <div class="badge">A.S. 2025/2026</div>
    </div>

</body>
</html>
