<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Siamo - ITI G. Ferraris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #228b22, #00008b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
        }

        .logo { font-weight: 800; font-size: 24px; }

        .navbar nav { display: flex; gap: 30px; }

        .navbar nav a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .navbar nav a:hover { opacity: 1; color: #00ffaa; }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffaa, #0077ff);
            color: #020a08;
            text-decoration: none;
            font-weight: 700;
        }

        /* CONTENITORE CENTRALE */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* IL PARAGRAFO CON IL BORDO DELLO SCREENSHOT */
        .paragraph {
            font-size: 1.6rem;
            line-height: 1.8;
            max-width: 850px;
            padding: 40px;
            color: white;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            
            /* BORDO GRADIENTE (come in foto) */
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05)), 
                              linear-gradient(to right, #00d2ff, #3a7bd5);
            background-origin: border-box;
            background-clip: padding-box, border-box;

            /* OMBRA ESTERNA (GLOW) */
            box-shadow: 0 0 15px rgba(58, 123, 213, 0.4);
            
            transition: all 0.4s ease;
        }

        /* Effetto Hover per accentuare l'illuminazione */
        .paragraph:hover {
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.7);
            transform: scale(1.01);
        }

        .highlight { font-weight: 700; }
        
        strong {
            display: block;
            margin-top: 15px;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">CSA MODERN</div>
        <nav>
            <a href="sostenibilita.html">Home</a>
            <a href="finalita.html">Finalità e Progetto</a>
            <a href="ChiSiamo.html">Chi siamo</a>
        </nav>
        <div class="buttons">
            <a href="scopri.html" class="btn">Scopri</a>
        </div>
    </header>

    <main class="main-content">
        <p class="paragraph">
            Siamo gli alunni <span class="highlight">Antoci Giuseppe</span>, 
            <span class="highlight">Chessari Luca</span> e 
            <span class="highlight">Scollo Daniele</span> 
            della classe <span class="highlight">4F</span> 
            dell'istituto tecnico industriale 
            <strong>"Galileo Ferraris" di Ragusa</strong>.
        </p>
    </main>

</body>
</html>
