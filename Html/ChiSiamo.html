
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Classe 4F - ITI G. Ferraris</title>
    <style>
        /* Reset e Font Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Sfondo con gradiente fluido */
        body {
            font-family: Arial, sans-serif;
              background: linear-gradient(135deg, #228b22, #00008b);
              margin: 0;
              padding: 0;
              text-align: center;
              color: #333;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.1); /* Leggera ombra per visibilità */
            backdrop-filter: blur(5px);
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
            color: white;
        }

        .navbar nav {
            display: flex;
            gap: 30px;
        }

        .navbar nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .navbar nav a:hover {
            color: #00ffaa;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffaa, #0077ff);
            color: #020a08;
            text-decoration: none;
            font-weight: 700;
            transition: 0.4s;
            border: none;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.4);
        }

        /* CONTENITORE CENTRALE */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Testo nel paragrafo */
        .paragraph {
            font-size: 1.5rem;
            line-height: 1.8;
            font-weight: 300;
            color: white; /* Testo bianco */
        }

        .highlight {
            font-weight: 700;
            color: #00ffaa; /* Un tocco di colore per i nomi, o "white" se vuoi tutto identico */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        strong {
            font-weight: 700;
            color: white;
        }

    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">CSA MODERN</div>
        <nav>
            <a href="sostenibilita.html">Home</a>
            <a href="finalita.html">Finalità e Progetto</a>
            <a href="ChiSiamo.html">Chi siamo</a>
        </nav>
        <div class="btn">
            <a href="scopri.html" class="btn">Scopri</a>
        </div>
    </header>
        <main class=main-content>
        <div class=glass-card>
            <p class="paragraph">
                Siamo gli alunni <span class="highlight">Antoci Giuseppe</span>, 
                <span class="highlight">Chessari Luca</span> e 
                <span class="highlight">Scollo Daniele</span> 
                della classe <span class="highlight">4F</span> 
                dell'istituto tecnico industriale <br>
                <strong>"Galileo Ferraris" di Ragusa</strong>.
            </p>
        </div>
        </main>
</body>
</html>
