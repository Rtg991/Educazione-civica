<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione Classe 4F - ITI G. Ferraris</title>
    <style>
        /* Reset base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sfondo originale statico */
        body {
            background: linear-gradient(135deg, #228b22, #00008b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            width: 100%;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .navbar nav {
            display: flex;
            gap: 30px;
        }

        .navbar nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            opacity: 0.8;
        }

        .navbar nav a:hover {
            opacity: 1;
            color: #00ffaa;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ffaa, #0077ff);
            color: #020a08;
            text-decoration: none;
            font-weight: 700;
            transition: 0.4s;
            border: none;
            display: inline-block;
        }

        /* CONTENITORE CENTRALE */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* PARAGRAFO CON BORDO SEMPRE VISIBILE */
        .paragraph {
            font-size: 1.6rem;
            line-height: 1.8;
            max-width: 850px;
            padding: 40px;
            color: white;
            /* Modificato: da transparent a bianco semi-trasparente */
            border: 2px solid rgba(255, 255, 255, 0.5); 
            border-radius: 15px;
            transition: all 0.4s ease-in-out;
            cursor: default;
            background: rgba(255, 255, 255, 0.02); /* Leggerissimo sfondo per dare corpo */
        }

        /* Effetto quando passi con il mouse */
        .paragraph:hover {
            border-color: #00ffaa; /* Il bordo diventa verde acqua */
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.5);
            transform: translateY(-5px); /* Leggero sollevamento */
            background: rgba(255, 255, 255, 0.08);
        }

        .highlight {
            font-weight: 700;
        }

        strong {
            display: block;
            margin-top: 10px;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">CSA MODERN</div>
        <nav>
            <a href="sostenibilita.html">Home</a>
            <a href="finalita.html">Finalità e Progetto</a>
            <a href="ChiSiamo.html">Chi siamo</a>
        </nav>
        <div class="buttons">
            <a href="scopri.html" class="btn">Scopri</a>
        </div>
    </header>

    <main class="main-content">
        <p class="paragraph">
            Siamo gli alunni <span class="highlight">Antoci Giuseppe</span>, 
            <span class="highlight">Chessari Luca</span> e 
            <span class="highlight">Scollo Daniele</span> 
            della classe <span class="highlight">4F</span> 
            dell'istituto tecnico industriale 
            <strong>"Galileo Ferraris" di Ragusa</strong>.
        </p>
    </main>

</body>
</html>
