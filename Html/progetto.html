<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Materie Scolastiche</title>
  <link rel="stylesheet" href="../progetto.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #228b22, #00008b);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

    /* NAVBAR UGUALE AL BODY */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 8%;
      background: linear-gradient(135deg, #228b22, #00008b);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar nav {
      display: flex;
      gap: 30px;
    }

    .navbar nav a {
      color: #8fa19e;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .navbar nav a:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
    }

    .logo {
      font-weight: 800;
      font-size: 24px;
      color: #fff;
      letter-spacing: 1px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 50px;
      background: linear-gradient(135deg, #00ffaa, #0077ff);
      color: #020a08;
      text-decoration: none;
      font-weight: 700;
      transition: 0.4s;
      border: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.4);
      filter: brightness(1.1);
    }

    h1 {
      margin: 20px;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .card button:hover {
      background: #0077ff;
    }

    #output {
      margin-top: 20px;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">CSA MODERN</div>
    <nav>
      <a href="sostenibilita.html">Home</a>
      <a href="finalita.html">Finalità e Progetto</a>
    </nav>
    <div class="buttons">
      <a href="scopri.html" class="btn">Scopri</a>
    </div>
  </header>

  <div class="container">

   <div class="card">
      <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80" alt="Sostenibilità">
      <h3>Agenda 2030 - Obiettivi</h3>
      <button onclick="mostra('Italiano - Storia')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=400&q=80" alt="Business">
      <h3>Azienda LBG</h3>
      <button onclick="mostra('Matematica')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1466611653911-954ffaa137a8?auto=format&fit=crop&w=400&q=80" alt="Wind Turbines">
      <h3>Renewable energy sources</h3>
      <button onclick="mostra('Inglese')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517649763962-0c6234278a0b?auto=format&fit=crop&w=400&q=80" alt="Sport">
      <h3>Sostenibilità ambientale nello sport</h3>
      <button onclick="mostra('Educazione Fisica')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80" alt="Circuit Board">
      <h3>Green Computing</h3>
      <button onclick="mostra('TPSIT')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc51?auto=format&fit=crop&w=400&q=80" alt="Server Room">
      <h3>Aziende sostenibili nelle reti</h3>
      <button onclick="mostra('Sistemi e Reti')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=400&q=80" alt="Coding">
      <h3>Aziende informatiche sostenibili</h3>
      <button onclick="mostra('Informatica')">Apri</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1509391366360-fe5bb60213ad?auto=format&fit=crop&w=400&q=80" alt="Solar Panels">
      <h3>Fonti rinnovabili - impianti fotovoltaici</h3>
      <button onclick="mostra('Telecomunicazioni')">Apri</button>
    </div>

  </div>
  <div id="output"></div>

  <script>
    function mostra(materia) {
      document.getElementById("output").innerText = "Hai selezionato: " + materia;
    }
  </script>

</body>
</html>
