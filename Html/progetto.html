<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Materie Scolastiche</title>
  <link rel="stylesheet" href="../progetto.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #228b22, #00008b);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

    /* NAVBAR UGUALE AL BODY */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 8%;
      background: linear-gradient(135deg, #228b22, #00008b);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar nav {
      display: flex;
      gap: 30px;
    }

    .navbar nav a {
      color: #8fa19e;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .navbar nav a:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
    }

    .logo {
      font-weight: 800;
      font-size: 24px;
      color: #fff;
      letter-spacing: 1px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 50px;
      background: linear-gradient(135deg, #00ffaa, #0077ff);
      color: #020a08;
      text-decoration: none;
      font-weight: 700;
      transition: 0.4s;
      border: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.4);
      filter: brightness(1.1);
    }

    h1 {
      margin: 20px;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .card button:hover {
      background: #0077ff;
    }

    #output {
      margin-top: 20px;
      font-size: 20px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
