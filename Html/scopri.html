  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
  /* Sfumatura da un verde foresta a un verde scurissimo */
  background: linear-gradient(135deg, #1b4332 0%, #081c15 100%);
  
  /* Mantiene lo sfondo fisso durante lo scroll */
  background-attachment: fixed;
  min-height: 100vh;
  
  /* Il testo deve essere chiaro per contrastare lo sfondo scuro */
  color: black; 
  
  overflow-x: hidden;
  margin: 0;
  font-family: Arial, sans-serif;
}

     .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      width: 200px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card-button {
  display: inline-block;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 500;
  color: white;
  background-color: #2d89ef;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s ease, transform 0.1s ease;
}

.card-button:hover {
  background-color: #1f6fd1;
}

.card-button:active {
  transform: scale(0.97);
}
    
    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 8%;
      background: linear-gradient(135deg, #1b4332 0%, #081c15 100%);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar nav {
      display: flex;
      gap: 30px;
    }

    .navbar nav a {
      color: #8fa19e;
      text-decoration: none;
      transition: 0.3s;
    }

    .navbar nav a:hover {
      color: #00ffaa;
    }

    .logo {
      font-weight: 800;
      font-size: 24px;
      color: #fff;
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      position: relative;
      padding-top: 40px;
      height: 10px;
      min-height: 40vh;
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 75px);
      margin: 0;
    }

    .hero span {
      color: #00ffaa;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,170,0.15), transparent 70%);
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(120px);
      z-index: -1;
    }

    .btn {
  padding: 10px 20px;
  border-radius: 10px;
  background: linear-gradient(135deg, #3cb371, #00008b);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
  position: relative;
  align-items: center;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px  #fff8dc;
}
    
    /* PARAGRAFO SISTEMATO */
    .paragraph {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 30px;
      backdrop-filter: blur(20px);
      width: 60%;
      margin: -50px auto 80px auto;
      text-align: center;
      transition: 0.3s;      
    }

    .paragraph:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
    }

    .paragraph .title {
      margin-bottom: 15px;
      transition: 0.3s;
    }

    .paragraph:hover .title {
      color: #00ffaa;
    }

    footer {
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }


    /* CILINDRO */
.cylinder-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 190px ;
  perspective: 1200px;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #007fff33 0%, #00aaff11 40%, transparent 70%);
  position: relative; /* aggiunge questo */
}

.cylinder {
  position: relative;
  width: 150px;
  height: 420px;
  transform-style: preserve-3d;
}

.cylinder-card {
  position: absolute;
  /* Dimensioni dinamiche basate sulla viewport o fisse ma proporzionate */
  width: 280px;  
  height: 380px; 
  top: 50%;
  left: 50%;
  /* Centratura perfetta prima della trasformazione JS */
  margin-left: -140px; 
  margin-top: -190px;
  
  overflow: hidden;
  border-radius: 8px; /* Arrotondato sta meglio con il design moderno */
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  
  /* Migliora la resa visiva durante la rotazione */
  backface-visibility: visible; 
}

.cylinder-card img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Riempie lo spazio senza deformare */
  display: block;
}

.cylinder-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes rotateCylinder {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(-360deg); }
}


  </style>
</head>

<script>document.addEventListener('DOMContentLoaded', () => {
  const cards = document.querySelectorAll('.cylinder-card');
  const totalCards = cards.length;
  const angleStep = 360 / totalCards;
  let currentAngle = 0;

  function animate() {
    currentAngle += 0.3;
    cards.forEach((card, i) => {
      const cardAngle = i * angleStep + currentAngle;
      card.style.transform = `rotateY(${cardAngle}deg) translateZ(450px) rotateY(${-cardAngle + 105}deg)`;
    });
    requestAnimationFrame(animate);
  }

  animate();
});
  </script>
